<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 50px;
        }

        #border{
            border: 2px solid #000;
            border-radius: 5px;
            background: linear-gradient(rgb(255, 188, 62), rgb(255, 67, 67));
        }

        tr th, tr td{
            border: 2px solid #000;
        }
    </style>
</head>
<body>
    <table id="border" cellspacing="10" cellpadding="15">
        <thead>
            <tr>
                <th>Header 1</th>
                <th>Header 2</th>
                <th>Header 3</th>
                <th>Header 4</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Row 1 Data 1</td>
                <td>Row 1 Data 2</td>
                <td>Row 1 Data 3</td>
                <td>Row 1 Data 4</td>
            </tr>
            <tr>
                <td>Row 2 Data 1</td>
                <td>Row 2 Data 2</td>
                <td>Row 2 Data 3</td>
                <td>Row 2 Data 4</td>
            </tr>
            <tr>
                <td>Row 3 Data 1</td>
                <td>Row 3 Data 2</td>
                <td>Row 3 Data 3</td>
                <td>Row 3 Data 4</td>
            </tr>
        </tbody>
        <tr align="center">
        <th></th>
        <th>Column Label</th>
        <th>Another one</th>
        <th>New Column</th>
    </tr>
    <tr>
        <th>Align</th>
        <td align="Left">Left</td>
        <td align="center">Center</td>
        <td align="Right">Right</td>
    </tr>
    <tr>
        <th><br>valign <br><br></th>
        <td>Default</td>
        <td valign="bottom">Bottom</td>
        <td valign="top">Top</td>
    </tr>
    <tfoot>
        <tr>
            <td colspan="4" align="center">Footer content</td>
        </tr>
    </tfoot>
    </table>
</body>
</html>
