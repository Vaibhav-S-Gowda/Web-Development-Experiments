<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contextual Selector</title>
    <style>
        ul li{
            color: brown;
            font-weight: bolder;
        }

        .really-big{
            background-color: yellow;
            width: 200px;
        }
    </style>
</head>
<body>
    <ul>
        <li>Banana</li>
        <li>Orange</li>
    </ul>
    <ol>
        <li>Apple</li>
        <li>Mango</li>
    </ol>

    <p class="really-big">This paragraph</p>
    <h1 class="really-big">PES University</h1>
</body>
</html>
