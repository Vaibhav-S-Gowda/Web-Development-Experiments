<!DOCTYPE html> 
<html> 
<head> 
<title>SRN + Semester Validation</title> 

<script> 
function validateForm() { 
    let srn = document.getElementById("srn").value.trim(); 
    let sem = parseInt(document.getElementById("sem").value); 
    let email = document.getElementById("email").value.trim();

    let pattern = /^[A-Z]{3}[0-9]{1}[A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{3}$/; 
    let gmail = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

    // SRN Validation 
    if (srn === "") { 
        alert("SRN cannot be empty"); 
        return false; 
    } 

    if (srn.includes(" ")) { 
        alert("No spaces allowed in SRN"); 
        return false; 
    } 

    if (!pattern.test(srn)) { 
        alert("Invalid SRN format!\nExample: PES1PG24CA221"); 
        return false; 
    } 

    // Semester Validation 
    if (isNaN(sem)) { 
        alert("Semester cannot be empty"); 
        return false; 
    } 

    if (sem < 1 || sem > 4) { 
        alert("Semester must be between 1 and 4"); 
        return false; 
    } 

    // Email Validation
    if (email === "") {
        alert("Email cannot be empty");
        return false;
    }

    if (!gmail.test(email)) {
        alert("Only Gmail IDs are allowed");
        return false;
    }

    alert("Valid Input ✔"); 
    return true; 
} 
</script> 
</head> 

<body> 
<h2>Enter Details</h2> 

<form onsubmit="return validateForm()"> 
    SRN: <input type="text" id="srn"><br><br> 
    Semester: <input type="number" id="sem"><br><br> 
    Email ID: <input type="email" id="email"><br><br>
    <input type="submit" value="Submit"> 
</form> 

</body> 
</html>
