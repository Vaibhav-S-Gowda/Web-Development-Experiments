<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>

<body bgcolor="red">

<br>

<table align="center" width="600" bgcolor="white" cellpadding="10" cellspacing="0" border="0">
<tr>
<td>

<h2 align="center">Student Registration Form</h2>

<form>

<table width="100%" cellpadding="5" cellspacing="5">

<!-- Student Name -->
<tr>
    <td colspan="2">Student Name</td>
</tr>
<tr>
    <td colspan="2">
        <input type="text" size="70">
    </td>
</tr>

<!-- Mobile & Email -->
<tr>
    <td>Mobile No.</td>
    <td>Email Id</td>
</tr>
<tr>
    <td><input type="text" size="30"></td>
    <td><input type="email" size="30"></td>
</tr>

<!-- Father & Mother -->
<tr>
    <td>Father Name</td>
    <td>Mother Name</td>
</tr>
<tr>
    <td><input type="text" size="30"></td>
    <td><input type="text" size="30"></td>
</tr>

<!-- Course & DOB -->
<tr>
    <td>Select Course</td>
    <td>Date Of Birth</td>
</tr>
<tr>
    <td>
        <select>
            <option>Select...</option>
            <option>BCA</option>
            <option>BBA</option>
            <option>BSc</option>
        </select>
    </td>
    <td>
        <input type="date">
    </td>
</tr>

<!-- Gender & Photo -->
<tr>
    <td>Gender</td>
    <td>Student Photo</td>
</tr>
<tr>
    <td>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
    </td>
    <td>
        <input type="file">
    </td>
</tr>

<!-- Branch -->
<tr>
    <td colspan="2">Select Branch</td>
</tr>
<tr>
    <td colspan="2">
        <input type="checkbox"> CSE
        <input type="checkbox"> IT
        <input type="checkbox"> ECE
        <input type="checkbox"> Civil
    </td>
</tr>

<!-- Address -->
<tr>
    <td colspan="2">Address</td>
</tr>
<tr>
    <td colspan="2">
        <textarea rows="4" cols="70"></textarea>
    </td>
</tr>

<!-- Submit -->
<tr>
    <td colspan="2" align="center">
        <br>
        <input type="submit" value="Submit" style="width:100%; background:red; color:white;">
    </td>
</tr>

</table>

</form>

</td>
</tr>
</table>

</body>
</html>
