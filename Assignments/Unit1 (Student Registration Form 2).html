<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>

<body>

<br><br>

<table align="center" width="600" cellpadding="15" cellspacing="0" border="1" bgcolor="#e6c7c7">
<tr>
<td>

<h2 align="center">Student Registration Form</h2>

<form>

<table width="100%" cellpadding="8" cellspacing="5">

<tr>
    <td>Roll no. :</td>
    <td><input type="text" size="40"></td>
</tr>

<tr>
    <td>Student name :</td>
    <td>
        <input type="text" placeholder="First Name" size="18">
        -
        <input type="text" placeholder="Last Name" size="18">
    </td>
</tr>

<tr>
    <td>Father's name :</td>
    <td><input type="text" size="40"></td>
</tr>

<tr>
    <td>Date of birth :</td>
    <td>
        <input type="text" placeholder="Day" size="5"> -
        <input type="text" placeholder="Month" size="5"> -
        <input type="text" placeholder="Year" size="8">
        (DD-MM-YYYY)
    </td>
</tr>

<tr>
    <td>Mobile no. :</td>
    <td>
        <input type="text" value="+91" size="4">
        -
        <input type="text" size="30">
    </td>
</tr>

<tr>
    <td>Email id :</td>
    <td><input type="email" size="40"></td>
</tr>

<tr>
    <td>Password :</td>
    <td><input type="password" size="40"></td>
</tr>

<tr>
    <td>Gender :</td>
    <td>
        <input type="radio" name="g"> Male
        <input type="radio" name="g"> Female
    </td>
</tr>

<tr>
    <td>Department :</td>
    <td>
        <input type="checkbox"> CSE
        <input type="checkbox"> IT
        <input type="checkbox"> ECE
        <input type="checkbox"> Civil
        <input type="checkbox"> Mech
    </td>
</tr>

<tr>
    <td>Course :</td>
    <td>
        <select>
            <option>------------------ Select Current Course's ------------------</option>
            <option>BCA</option>
            <option>BBA</option>
            <option>BSc</option>
        </select>
    </td>
</tr>

<tr>
    <td>Student photo :</td>
    <td><input type="file"></td>
</tr>

<tr>
    <td>City :</td>
    <td><input type="text" size="40"></td>
</tr>

<tr>
    <td>Address :</td>
    <td>
        <textarea rows="4" cols="40"></textarea>
    </td>
</tr>

</table>

</form>

</td>
</tr>
</table>

</body>
</html>
