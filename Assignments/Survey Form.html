<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic Survey Form</title>
<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        gap: 30px;
        padding: 20px;
        background: #f5f5f5;
    }

    .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 45%;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-top: 10px;
    }

    .summary {
        background: #222;
        color: #fff;
    }

    .summary p {
        margin: 8px 0;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Survey Form</h2>

    <label>Name:
        <input type="text" id="name" oninput="updateSummary()">
    </label>

    <label>Age:
        <input type="number" id="age" oninput="updateSummary()">
    </label>

    <label>Gender:</label>
    <label><input type="radio" name="gender" value="Male" onchange="updateSummary()"> Male</label>
    <label><input type="radio" name="gender" value="Female" onchange="updateSummary()"> Female</label>

    <label>Skills:</label>
    <label><input type="checkbox" value="HTML" onchange="updateSummary()"> HTML</label>
    <label><input type="checkbox" value="CSS" onchange="updateSummary()"> CSS</label>
    <label><input type="checkbox" value="JavaScript" onchange="updateSummary()"> JavaScript</label>

    <label>Country:
        <select id="country" onchange="updateSummary()">
            <option value="">Select</option>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
        </select>
    </label>
</div>

<div class="container summary">
    <h2>Live Summary</h2>
    <p><strong>Name:</strong> <span id="s_name">-</span></p>
    <p><strong>Age:</strong> <span id="s_age">-</span></p>
    <p><strong>Gender:</strong> <span id="s_gender">-</span></p>
    <p><strong>Skills:</strong> <span id="s_skills">-</span></p>
    <p><strong>Country:</strong> <span id="s_country">-</span></p>
</div>

<script>
function updateSummary() {
    // Name
    document.getElementById("s_name").innerText =
        document.getElementById("name").value || "-";

    // Age
    document.getElementById("s_age").innerText =
        document.getElementById("age").value || "-";

    // Gender
    let gender = document.querySelector('input[name="gender"]:checked');
    document.getElementById("s_gender").innerText =
        gender ? gender.value : "-";

    // Skills
    let skills = [];
    document.querySelectorAll('input[type="checkbox"]:checked')
        .forEach(cb => skills.push(cb.value));

    document.getElementById("s_skills").innerText =
        skills.length ? skills.join(", ") : "-";

    // Country
    document.getElementById("s_country").innerText =
        document.getElementById("country").value || "-";
}
</script>

</body>
</html>
