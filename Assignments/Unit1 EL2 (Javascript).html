<!DOCTYPE html>  
<html>  
<head>  
<title>JS Question 1</title>  
</head>  
<body>  
<h2>Question 1 Programs</h2>  
<button onclick="reverseNumber()">Reverse Number</button>  
<button onclick="multiplicationTable()">Multiplication Table</button>  
<button onclick="randomNumber()">Random Number</button>  
<script>  
function reverseNumber(){  
let num = prompt("Enter a number");  
let rev = num.split("").reverse().join("");  
alert("Reversed number = " + rev);  
}  
function multiplicationTable(){  
let n = prompt("Enter number");  
let result="";  
for(let i=1;i<=10;i++){  
result += n + " x " + i + " = " + (n*i) + "\n";  
}  
alert(result);  
}  
function randomNumber(){  
let min = parseInt(prompt("Enter min"));  
let max = parseInt(prompt("Enter max"));  
function getRndInteger(min, max){  
return Math.floor(Math.random() * (max - min + 1)) + min;  
}  
alert("Random number = " + getRndInteger(min,max));  
}  
</script>  
</body>  
</html>
