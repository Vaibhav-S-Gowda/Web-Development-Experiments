<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event handling on Mouse Hover</title>
</head>
<body>
    <h2>Example 2: MouseHover picture change</h2>

    <img src="japanese-pagoda-sunset-serene-coastal-landscape.jpg" alt="landscape" width="500" height="400" onmouseover="this.src='anime.jpg'"
    onmouseout="this.src='japanese-pagoda-sunset-serene-coastal-landscape.jpg'">
</body>
</html>
