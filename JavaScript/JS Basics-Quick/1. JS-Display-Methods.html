<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Display Methods</title>
</head>
<body>
<!-- JavaScript Display Methods -->
    <h2>JavaScript Display Methods Demo</h2>

    <!-- HTML element for innerHTML -->
    <p id="demo"></p>

    <script>
        // 1. Writing into an HTML element using innerHTML
        document.getElementById("demo").innerHTML = "Hello using innerHTML!";

        // 2. Writing into HTML output using document.write()
        document.write("<p>Hello using document.write()</p>");

        // 3. Writing into an alert box using window.alert()
        window.alert("Hello using alert box!");

        // 4. Writing into the browser console using console.log().
        //Refer Inspect Window -> Console window
        console.log("Hello using console.log()");

        // 5. Printing the page using window.print()
        // Uncomment the below line to test print
        // window.print();
    </script>

</body>
</html>
