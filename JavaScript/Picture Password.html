<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture Password</title>
</head>
<body>
    <h3>Click the image to enter a password(Protected Document).</h3>
        
    <a href="javascript:password()">
        <img src="anime.jpg" 
        name="picture-password"
        width=500
        alt="anime">
    </a>
    <script>
        function password() {
                ret = prompt('Type the word castle',"");
            if (ret=="castle") {
                location = 'parseInt.html';
            } 
            else {
                alert("Please try again!!")
            }
        }
    </script>
</body>
</html>
