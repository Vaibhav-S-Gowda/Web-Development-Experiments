<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM execution</title>
</head>
<body>
    <p id="demo">Hello</p>
    <input type="text" name="username" value="What ra Uncle">

    <script>
        document.getElementById("demo").innerHTML="Welcome";
        let x = document.getElementsByName("username");
        alert(x[0].value);
    </script>
</body>
</html>
