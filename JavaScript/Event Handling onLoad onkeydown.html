<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body onload="load_body()">
    <h2>The OnKey Event</h2>
    <input type="text" onkeydown="myFunction()">
    <p id="demo"></p>
    <script>
        function myFunction() {
            document.getElementById('demo').innerHTML = "You pressed a key inside the input field";
        }

        function load_body() {
            alert("Welcome!!!\n\n" + "This is the class of MCA 2nd Semester. \n\n" + "We are studying Web Application Frameworks-I\n");
        }
    </script>
</body>
</html>
