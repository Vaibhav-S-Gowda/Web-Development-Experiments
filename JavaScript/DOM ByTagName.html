<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object</title>
</head>
<body style="background-color: azure;">
    <h1>The Document Object</h1>
    <h2>The getElementByTagName() Method</h2>
    <p style="color: red; font-size: 40px;">This is a paragraph.</p>
    <p style="color: rgb(7, 226, 11); font-size: 20px;">This is a paragraph.</p>
    <p style="color: rgb(132, 0, 255); font-size: 20px; font-style: italic;">This is a paragraph.</p>

    <script>
        document.getElementsByTagName("p")[0].innerHTML="Hello World!";
    </script>
</body>
</html>
